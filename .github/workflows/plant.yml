name: Plant Master Designs

on:
  push:
    paths:
      - 'MASTER_DESIGNS.md'

jobs:
  plant:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Run Planting Script
        run: python PlantSeeds.py
      - name: Commit and Push Individual Designs
        run: |
          git config --global user.name 'Walipa-Bot'
          git config --global user.email 'bot@walipa.com'
          git add designs/*.md
          git commit -m "docs: auto-expand designs from master seed" || echo "No changes"
          git push
